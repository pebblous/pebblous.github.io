<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300" font-family="Pretendard, -apple-system, sans-serif">
  <rect x="0" y="0" width="640" height="300" rx="16" fill="#ffffff"/>

  <!-- Box A: code -->
  <rect x="40" y="34" width="250" height="96" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="165" y="72" text-anchor="middle" font-size="22" font-weight="700" fill="#94A3B8" font-family="monospace">&lt;/&gt;</text>
  <text x="165" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#475569">코드 작성</text>
  <text x="165" y="119" text-anchor="middle" font-size="12" fill="#94A3B8">누가 만들었는가 · 개발자</text>

  <!-- Box B: control -->
  <rect x="350" y="34" width="250" height="96" rx="12" fill="#FFF4EC" stroke="#F86825" stroke-width="1.5"/>
  <text x="475" y="72" text-anchor="middle" font-size="22" font-weight="700" fill="#F86825">⚙</text>
  <text x="475" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">실제 통제</text>
  <text x="475" y="119" text-anchor="middle" font-size="12" fill="#C2410C">누가 움직였는가 · 배포·운영 기업</text>

  <!-- connector A: dashed, muted -->
  <line x1="165" y1="130" x2="165" y2="176" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 4"/>
  <circle cx="165" cy="190" r="14" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="165" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#94A3B8">✕</text>
  <text x="165" y="222" text-anchor="middle" font-size="12" fill="#94A3B8">판정 기준 아님</text>

  <!-- connector B: solid, orange -->
  <line x1="475" y1="130" x2="475" y2="176" stroke="#F86825" stroke-width="2.5"/>
  <circle cx="475" cy="190" r="14" fill="#F86825"/>
  <text x="475" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">✓</text>
  <text x="475" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#F86825">판정 기준</text>

  <!-- result bar -->
  <rect x="150" y="248" width="340" height="40" rx="10" fill="#1E293B"/>
  <text x="320" y="273" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">책임 = 통제한 주체 (看控制而非看代码)</text>
</svg>
