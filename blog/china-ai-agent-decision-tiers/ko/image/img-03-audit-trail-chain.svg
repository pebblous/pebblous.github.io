<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" font-family="Pretendard, -apple-system, sans-serif">
  <rect x="0" y="0" width="640" height="340" rx="16" fill="#ffffff"/>

  <!-- three input boxes -->
  <rect x="30" y="28" width="180" height="92" rx="12" fill="#FFF4EC" stroke="#F86825" stroke-width="1.5"/>
  <text x="120" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">결과</text>
  <text x="120" y="80" text-anchor="middle" font-size="11.5" fill="#64748B">무엇을</text>
  <text x="120" y="96" text-anchor="middle" font-size="11.5" fill="#64748B">실행했는가</text>

  <rect x="230" y="28" width="180" height="92" rx="12" fill="#FFF4EC" stroke="#F86825" stroke-width="1.5"/>
  <text x="320" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">근거</text>
  <text x="320" y="80" text-anchor="middle" font-size="11.5" fill="#64748B">무엇을 참조해</text>
  <text x="320" y="96" text-anchor="middle" font-size="11.5" fill="#64748B">판단했는가</text>

  <rect x="430" y="28" width="180" height="92" rx="12" fill="#FFF4EC" stroke="#F86825" stroke-width="1.5"/>
  <text x="520" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">책임 소재</text>
  <text x="520" y="80" text-anchor="middle" font-size="11.5" fill="#64748B">누가 언제</text>
  <text x="520" y="96" text-anchor="middle" font-size="11.5" fill="#64748B">승인했는가</text>

  <!-- converging connectors -->
  <line x1="120" y1="120" x2="230" y2="168" stroke="#F86825" stroke-width="2"/>
  <line x1="320" y1="120" x2="320" y2="168" stroke="#F86825" stroke-width="2"/>
  <line x1="520" y1="120" x2="410" y2="168" stroke="#F86825" stroke-width="2"/>

  <!-- lineage bar -->
  <rect x="100" y="172" width="440" height="52" rx="10" fill="#1E293B"/>
  <text x="320" y="203" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">데이터 계보로 연결</text>

  <!-- arrow down -->
  <line x1="320" y1="224" x2="320" y2="256" stroke="#94A3B8" stroke-width="2"/>
  <polygon points="320,264 313,252 327,252" fill="#94A3B8"/>

  <!-- result -->
  <rect x="150" y="272" width="340" height="46" rx="10" fill="#ffffff" stroke="#F86825" stroke-width="2"/>
  <text x="320" y="300" text-anchor="middle" font-size="14.5" font-weight="700" fill="#F86825">✓ 인가 정책, 사후에 증명 가능</text>
</svg>
