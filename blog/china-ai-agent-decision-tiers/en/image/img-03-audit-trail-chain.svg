<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" font-family="Outfit, -apple-system, sans-serif">
  <rect x="0" y="0" width="640" height="340" rx="16" fill="#ffffff"/>

  <!-- three input boxes -->
  <rect x="30" y="28" width="180" height="92" rx="12" fill="#FFF4EC" stroke="#F86825" stroke-width="1.5"/>
  <text x="120" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Outcome</text>
  <text x="120" y="80" text-anchor="middle" font-size="11" fill="#64748B">What the agent</text>
  <text x="120" y="96" text-anchor="middle" font-size="11" fill="#64748B">actually did</text>

  <rect x="230" y="28" width="180" height="92" rx="12" fill="#FFF4EC" stroke="#F86825" stroke-width="1.5"/>
  <text x="320" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Rationale</text>
  <text x="320" y="80" text-anchor="middle" font-size="11" fill="#64748B">What it consulted</text>
  <text x="320" y="96" text-anchor="middle" font-size="11" fill="#64748B">to judge</text>

  <rect x="430" y="28" width="180" height="92" rx="12" fill="#FFF4EC" stroke="#F86825" stroke-width="1.5"/>
  <text x="520" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Accountability</text>
  <text x="520" y="80" text-anchor="middle" font-size="11" fill="#64748B">Who approved it,</text>
  <text x="520" y="96" text-anchor="middle" font-size="11" fill="#64748B">and when</text>

  <!-- converging connectors -->
  <line x1="120" y1="120" x2="230" y2="168" stroke="#F86825" stroke-width="2"/>
  <line x1="320" y1="120" x2="320" y2="168" stroke="#F86825" stroke-width="2"/>
  <line x1="520" y1="120" x2="410" y2="168" stroke="#F86825" stroke-width="2"/>

  <!-- lineage bar -->
  <rect x="100" y="172" width="440" height="52" rx="10" fill="#1E293B"/>
  <text x="320" y="203" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Linked as data lineage</text>

  <!-- arrow down -->
  <line x1="320" y1="224" x2="320" y2="256" stroke="#94A3B8" stroke-width="2"/>
  <polygon points="320,264 313,252 327,252" fill="#94A3B8"/>

  <!-- result -->
  <rect x="120" y="272" width="400" height="46" rx="10" fill="#ffffff" stroke="#F86825" stroke-width="2"/>
  <text x="320" y="300" text-anchor="middle" font-size="14.5" font-weight="700" fill="#F86825">✓ Authorization policy, provable after the fact</text>
</svg>
