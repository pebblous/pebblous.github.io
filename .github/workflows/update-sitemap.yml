name: Update Sitemap & RSS & llms.txt

on:
  push:
    branches: [main]
    paths:
      - 'articles.json'
      - 'tools/generate-sitemap.js'
      - 'tools/generate-rss.js'
      - 'tools/generate-llms-txt.py'
  schedule:
    # Run daily at 00:00 UTC (09:00 KST)
    - cron: '0 0 * * *'
  workflow_dispatch:

# 연속 머지/스케줄 run 직렬화 — 인덱스 push 경합(race) 방지 (#289).
concurrency:
  group: update-indexes
  cancel-in-progress: false

jobs:
  update-sitemap-and-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 브랜치 push + 머지
      pull-requests: write   # 인덱스 갱신 PR 생성·머지 (main ruleset 우회, #289)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # PAT 우선(미설정 시 GITHUB_TOKEN). pebblous org 정책이 GITHUB_TOKEN 의
          # PR 생성을 막으므로(#289), 인덱스 PR 생성·머지는 PAT(INDEX_PUSH_TOKEN)로 한다.
          token: ${{ secrets.INDEX_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Fetch full history for better git operations

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate sitemap
        run: |
          node tools/generate-sitemap.js
          echo "Sitemap generation completed"
        continue-on-error: false

      - name: Generate RSS feed
        run: |
          node tools/generate-rss.js
          echo "RSS feed generation completed"
        continue-on-error: false

      - name: Generate llms.txt
        run: |
          python3 tools/generate-llms-txt.py
          echo "llms.txt generation completed"
        continue-on-error: false

      - name: Check for changes
        id: check_changes
        run: |
          SITEMAP_CHANGED=false
          RSS_CHANGED=false
          LLMS_CHANGED=false

          git diff --exit-code --quiet sitemap.xml || SITEMAP_CHANGED=true
          git diff --exit-code --quiet rss.xml || RSS_CHANGED=true
          git diff --exit-code --quiet llms.txt || LLMS_CHANGED=true

          if [ "$SITEMAP_CHANGED" = "true" ] || [ "$RSS_CHANGED" = "true" ] || [ "$LLMS_CHANGED" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

          echo "sitemap_changed=$SITEMAP_CHANGED" >> $GITHUB_OUTPUT
          echo "rss_changed=$RSS_CHANGED" >> $GITHUB_OUTPUT
          echo "llms_changed=$LLMS_CHANGED" >> $GITHUB_OUTPUT

          [ "$SITEMAP_CHANGED" = "true" ] && echo "📝 Sitemap has changes" && git diff --stat sitemap.xml || echo "✅ No changes in sitemap"
          [ "$RSS_CHANGED" = "true" ] && echo "📝 RSS feed has changes" && git diff --stat rss.xml || echo "✅ No changes in RSS feed"
          [ "$LLMS_CHANGED" = "true" ] && echo "📝 llms.txt has changes" && git diff --stat llms.txt || echo "✅ No changes in llms.txt"

      - name: Commit & merge index updates via PR
        if: steps.check_changes.outputs.changed == 'true'
        env:
          # PAT(INDEX_PUSH_TOKEN) 로 PR 생성·머지 — org 정책이 GITHUB_TOKEN PR 생성을 막음(#289).
          GH_TOKEN: ${{ secrets.INDEX_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # main 직접 push 는 ruleset(pull_request 필수, bypass 없음)이 GH013 으로 거부(#289).
          # sitemap/rss/llms 는 CODEOWNERS 무소속 + 승인 0 → 봇이 PR 만들어 자체 머지하면
          # 거버넌스(모든 변경 PR 경유)를 지키면서 인덱싱 자동화 유지.
          BRANCH="auto/index-update-${{ github.run_id }}-${{ github.run_attempt }}"
          git checkout -b "$BRANCH"

          COMMIT_FILES=""
          if [ "${{ steps.check_changes.outputs.sitemap_changed }}" = "true" ]; then
            git add sitemap.xml; COMMIT_FILES="sitemap.xml"
          fi
          if [ "${{ steps.check_changes.outputs.rss_changed }}" = "true" ]; then
            git add rss.xml; COMMIT_FILES="${COMMIT_FILES:+$COMMIT_FILES, }rss.xml"
          fi
          if [ "${{ steps.check_changes.outputs.llms_changed }}" = "true" ]; then
            git add llms.txt; COMMIT_FILES="${COMMIT_FILES:+$COMMIT_FILES, }llms.txt"
          fi

          git commit -m "chore(index): auto-update $COMMIT_FILES [skip ci]"
          git push origin "$BRANCH"

          # 실패 시 방금 push 한 브랜치 정리(orphan 누적 방지).
          cleanup() { git push origin --delete "$BRANCH" >/dev/null 2>&1 || true; }

          if ! gh pr create --base main --head "$BRANCH" \
            --title "chore(index): auto-update $COMMIT_FILES [skip ci]" \
            --body "자동 인덱스 갱신(sitemap/rss/llms). update-sitemap.yml 가 발행 후 생성·자체 머지. #289"; then
            cleanup
            echo "::error::인덱스 PR 생성 실패 — INDEX_PUSH_TOKEN 시크릿(사본 contents+PR write PAT) 확인 필요. pebblous org 정책이 GITHUB_TOKEN PR 생성을 막음(#289)."
            exit 1
          fi

          # 머지(승인0·코드오너無 → 즉시 가능). mergeability 계산 지연 대비 재시도.
          merged=false
          for i in 1 2 3; do
            if gh pr merge "$BRANCH" --merge --delete-branch; then merged=true; break; fi
            sleep 5
          done
          if [ "$merged" != "true" ]; then
            gh pr close "$BRANCH" --delete-branch >/dev/null 2>&1 || cleanup
            echo "::error::인덱스 PR 머지 실패 — INDEX_PUSH_TOKEN 권한/ruleset 확인 필요(#289)."
            exit 1
          fi

      - name: Submit sitemap to Google
        if: steps.check_changes.outputs.sitemap_changed == 'true'
        run: |
          echo "📡 Notifying Google about sitemap update..."
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://www.google.com/ping?sitemap=https://blog.pebblous.ai/sitemap.xml")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Successfully notified Google (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Google notification returned HTTP $HTTP_CODE"
          fi
        continue-on-error: true  # Don't fail workflow if Google ping fails

      - name: Summary
        if: always()
        run: |
          echo "## Sitemap & RSS & llms.txt Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Sitemap changed**: ${{ steps.check_changes.outputs.sitemap_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **RSS changed**: ${{ steps.check_changes.outputs.rss_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **llms.txt changed**: ${{ steps.check_changes.outputs.llms_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "- **Status**: ✅ Updated and pushed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: ℹ️ No changes needed" >> $GITHUB_STEP_SUMMARY
          fi
