name: Validate Articles

on:
  push:
    paths:
      - 'articles.json'
  pull_request:
    paths:
      - 'articles.json'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "Validating articles.json syntax..."
          if ! jq empty articles.json 2>/dev/null; then
            echo "❌ Invalid JSON syntax in articles.json"
            exit 1
          fi
          echo "✅ JSON syntax is valid"

      - name: Validate articles schema
        run: |
          echo "Validating articles schema..."

          # Check required top-level keys
          if ! jq -e '.articles' articles.json > /dev/null; then
            echo "❌ Missing 'articles' array"
            exit 1
          fi

          if ! jq -e '.categories' articles.json > /dev/null; then
            echo "❌ Missing 'categories' object"
            exit 1
          fi

          # Check each article has required fields
          jq -r '.articles[] | select(.id == null or .title == null or .category == null or .date == null or .path == null) | .id // "unknown"' articles.json > /tmp/invalid_articles.txt

          if [ -s /tmp/invalid_articles.txt ]; then
            echo "❌ Found articles with missing required fields:"
            cat /tmp/invalid_articles.txt
            exit 1
          fi

          echo "✅ All articles have required fields"

      - name: Check for duplicate IDs
        run: |
          echo "Checking for duplicate article IDs..."

          duplicates=$(jq -r '.articles[].id' articles.json | sort | uniq -d)

          if [ -n "$duplicates" ]; then
            echo "❌ Found duplicate article IDs:"
            echo "$duplicates"
            exit 1
          fi

          echo "✅ No duplicate IDs found"

      - name: Validate dates
        run: |
          echo "Validating article dates..."

          invalid_dates=$(jq -r '.articles[] | select(.date | . == null or (. | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}$") | not)) | .id' articles.json)

          if [ -n "$invalid_dates" ]; then
            echo "❌ Found articles with invalid date format (should be YYYY-MM-DD):"
            echo "$invalid_dates"
            exit 1
          fi

          echo "✅ All dates are valid"

      - name: Validate categories
        run: |
          echo "Validating article categories..."

          # Get defined categories
          defined_categories=$(jq -r '.categories | keys[]' articles.json)

          # Check if all article categories are defined
          for category in $(jq -r '.articles[].category' articles.json | sort -u); do
            if ! echo "$defined_categories" | grep -q "^${category}$"; then
              echo "❌ Article category '$category' is not defined in categories object"
              exit 1
            fi
          done

          echo "✅ All article categories are valid"

      - name: Check featured limits (max 3 per category)
        run: |
          echo "Checking featured article limits..."

          for category in $(jq -r '.categories | keys[]' articles.json); do
            count=$(jq -r "[.articles[] | select(.featured == true and .category == \"$category\")] | length" articles.json)
            if [ "$count" -gt 3 ]; then
              echo "❌ Category '$category' has $count featured articles (max 3)"
              exit 1
            fi
          done

          echo "✅ All categories within featured limits"

      - name: Check noindex conflicts
        run: |
          echo "Checking for published articles pointing to noindex pages..."

          errors=0
          for path in $(jq -r '.articles[] | select(.published == true) | .path' articles.json); do
            # Resolve to actual file
            if echo "$path" | grep -q '\.html$'; then
              file="$path"
            else
              file="${path%/}/index.html"
            fi

            if [ -f "$file" ]; then
              if grep -q 'noindex' "$file" && grep -q 'http-equiv="refresh"\|location.replace' "$file"; then
                id=$(jq -r ".articles[] | select(.path == \"$path\") | .id" articles.json)
                echo "❌ [$id] path points to redirect stub with noindex: $path"
                errors=$((errors + 1))
              fi
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "❌ Found $errors noindex conflicts. Run: python3 tools/validate-articles.py --fix"
            exit 1
          fi

          echo "✅ No noindex conflicts"

      - name: Summary
        if: success()
        run: |
          total=$(jq '.articles | length' articles.json)
          published=$(jq '[.articles[] | select(.published == true)] | length' articles.json)
          featured=$(jq '[.articles[] | select(.featured == true)] | length' articles.json)

          echo "📊 Validation Summary:"
          echo "  Total articles: $total"
          echo "  Published: $published"
          echo "  Featured: $featured"
          echo ""
          echo "✅ All validations passed!"
