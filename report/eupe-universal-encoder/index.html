<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=ko/">
    <link rel="canonical" href="https://blog.pebblous.ai/report/eupe-universal-encoder/ko/">
    <link rel="alternate" hreflang="ko" href="https://blog.pebblous.ai/report/eupe-universal-encoder/ko/">
    <link rel="alternate" hreflang="en" href="https://blog.pebblous.ai/report/eupe-universal-encoder/en/">
    <link rel="alternate" hreflang="x-default" href="https://blog.pebblous.ai/report/eupe-universal-encoder/ko/">
    <title>Redirecting...</title>
    <script>
        // Prefer user's browser language
        var lang = (navigator.language || navigator.userLanguage || 'ko').substring(0, 2).toLowerCase();
        if (lang === 'en') {
            window.location.replace('en/');
        } else {
            window.location.replace('ko/');
        }
    </script>
</head>
<body>
    <p>Redirecting... <a href="ko/">한국어</a> | <a href="en/">English</a></p>
</body>
</html>
