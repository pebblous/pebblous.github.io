<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found | Pebblous Blog</title>
    <meta name="description" content="요청하신 페이지를 찾을 수 없습니다. Pebblous 블로그 메인으로 돌아가시겠어요?">
    <meta name="robots" content="noindex, follow">

    <!-- Favicon -->
    <link rel="icon" href="/image/favicon.ico" sizes="any">
    <link rel="icon" href="/image/Pebblous_BM_Orange_RGB.png" type="image/png">

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-57L9F58B');</script>

    <!-- Theme detection (FOUC prevention — sync, before CSS) -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="/css/theme-variables.css">
    <link rel="stylesheet" href="/styles/tailwind-build.css">
    <link rel="stylesheet" href="/styles/common-styles.css">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

    <style>
        .fade-in-404 {
            opacity: 0;
            animation: fadeIn404 0.8s forwards;
        }
        @keyframes fadeIn404 {
            to { opacity: 1; }
        }
        .float-404 {
            animation: float404 3s ease-in-out infinite;
        }
        @keyframes float404 {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .error-number { color: var(--accent-color, #F86825); }
        .error-title { color: var(--heading-color, #ffffff); }
        .error-desc { color: var(--text-secondary, #94a3b8); }
        .help-text { color: var(--text-muted, #64748b); }
        .btn-primary {
            background-color: var(--accent-color, #F86825);
            color: #ffffff;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary {
            background-color: var(--bg-card, rgba(31, 41, 55, 0.95));
            color: var(--text-secondary, #94a3b8);
            border: 1px solid var(--border-color, #374151);
        }
        .btn-secondary:hover {
            background-color: var(--contact-btn-hover, #334155);
        }
        .divider-404 { border-color: var(--border-color, #374151); }
        .nav-link-404 { color: var(--text-secondary, #94a3b8); }
        .nav-link-404:hover { color: var(--accent-color, #F86825); }
        .nav-sep-404 { color: var(--border-color, #374151); }
    </style>
</head>
<body style="background-color: var(--bg-primary, #020617); color: var(--text-primary, #cbd5e1); font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;" class="antialiased min-h-screen flex flex-col">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-57L9F58B" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-6">
        <div class="max-w-2xl mx-auto text-center fade-in-404">
            <!-- 404 Number -->
            <div class="mb-8 float-404">
                <h1 class="text-9xl md:text-[12rem] font-bold error-number leading-none">404</h1>
            </div>

            <!-- Error Message -->
            <h2 class="text-2xl md:text-3xl font-bold error-title mb-4">
                페이지를 찾을 수 없습니다
            </h2>
            <p class="text-lg error-desc mb-8 leading-relaxed">
                요청하신 페이지가 존재하지 않거나 이동되었을 수 있습니다.<br>
                URL을 다시 확인해주시거나 메인 페이지로 돌아가주세요.
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a href="/" class="px-8 py-3 btn-primary font-semibold rounded-lg transition-opacity duration-200 inline-block">
                    메인으로 돌아가기
                </a>
                <button onclick="history.back()" class="px-8 py-3 btn-secondary font-semibold rounded-lg transition-colors duration-200">
                    이전 페이지로
                </button>
            </div>

            <!-- Additional Help -->
            <div class="mt-12 pt-8 border-t divider-404">
                <p class="text-sm help-text mb-4">찾으시는 내용이 있으신가요?</p>
                <div class="flex flex-wrap gap-3 justify-center text-sm">
                    <a href="/#art" class="nav-link-404 transition-colors">Data Art</a>
                    <span class="nav-sep-404">|</span>
                    <a href="/#tech" class="nav-link-404 transition-colors">Tech Insights</a>
                    <span class="nav-sep-404">|</span>
                    <a href="/#story" class="nav-link-404 transition-colors">Data Stories</a>
                    <span class="nav-sep-404">|</span>
                    <a href="/rss.xml" class="nav-link-404 transition-colors">RSS Feed</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="/scripts/common-utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Load shared header/footer
            await PebblousComponents.loadAll();
            // Initialize theme switcher (needs header loaded first for #theme-switcher)
            var savedTheme = localStorage.getItem('theme') || 'dark';
            PebblousTheme.init(savedTheme);
        });
    </script>
</body>
</html>
