# images.yaml — Robotic Painting (Robotic Painting) 포스트 이미지 배치 계획
# 파일 경로: project/DAL/robotic-painting/image/
# 포맷: 웹 최적화 PNG or WebP, 최대 폭 800px (본문 폭), 고화질은 1200px
# OG 이미지: 1200×630px

images:
  # ─────────────────────────────────────────────
  # OG / Hero
  # ─────────────────────────────────────────────
  - id: og
    file: og.png
    width: 1200
    height: 630
    placement: OG meta + hero background (optional)
    description: >
      대표 이미지. 인디 로봇이 그림을 그리는 장면 또는
      완성된 Robotic Painting 작품 한 점.
      텍스트 오버레이 가능 영역 필요 (SNS 공유 시 제목 겹침).
    priority: required

  # ─────────────────────────────────────────────
  # Section 1 — 왜 코드로 그림을 그리는가
  # ─────────────────────────────────────────────
  - id: sec1-code-painting-origin
    file: sec1-code-painting-origin.png
    placement: Section 1, 첫 번째 문단 뒤
    section: section-1
    after_paragraph: 1
    description: >
      Code Painting의 초기 작품 예시. Mathematica 화면의
      알고리즘 패턴 또는 초기 Line Grid 결과물.
      "왜 코드인가"의 시각적 답변.
    alt_ko: "Code Painting 초기 작품 — Wolfram Language로 생성된 수학적 패턴"
    alt_en: "Early Code Painting work — mathematical pattern generated with Wolfram Language"
    priority: recommended

  # ─────────────────────────────────────────────
  # Section 2 — How (Vibe Coding)
  # ─────────────────────────────────────────────
  - id: sec2-vibe-coding-process
    file: sec2-vibe-coding-process.png
    placement: Section 2, "AI와의 공동 제작" 소제목 뒤
    section: section-2
    after_element: "h3:AI와의 공동 제작"
    description: >
      Vibe Coding 작업 과정 스크린샷.
      Claude와의 대화 + Mathematica 코드 결과가 나란히 보이는 화면,
      또는 자연어 → 코드 → 패턴 변환 과정을 보여주는 다이어그램.
    alt_ko: "Vibe Coding 과정 — AI(Claude)와의 대화로 알고리즘을 구현하는 장면"
    alt_en: "Vibe Coding process — implementing algorithms through conversation with AI (Claude)"
    priority: recommended

  - id: sec2-phase1-gcode
    file: sec2-phase1-gcode.png
    placement: Section 2, Phase 1 카드 아래
    section: section-2
    after_element: "Phase 카드 그리드"
    description: >
      G-code 시각화 예시. GCode.wl의 plotGCode2D 출력 또는
      Wolfram Graphics → G-code 변환 전후 비교.
      선분과 경로가 시각적으로 드러나는 이미지.
    alt_ko: "G-code 시각화 — Wolfram Graphics에서 G-code로 변환된 경로"
    alt_en: "G-code visualization — path converted from Wolfram Graphics to G-code"
    priority: optional

  - id: sec2-phase2-patterns
    file: sec2-phase2-patterns.png
    placement: Section 2, Phase 카드 그리드 아래 (sec2-phase1-gcode와 택 1 또는 나란히)
    section: section-2
    after_element: "Phase 카드 그리드"
    description: >
      무한 패턴 시스템의 변주 예시. 같은 config에서 seed만 바꿨을 때
      생성되는 다양한 패턴 4~6개를 그리드로 배치.
      "같은 규칙에서 태어나지만 각각 유일한 형상들"을 시각화.
    alt_ko: "Line Grid 변주 — 동일 config, 다른 seed에서 태어난 유일한 패턴들"
    alt_en: "Line Grid variations — unique patterns born from the same config with different seeds"
    priority: recommended

  - id: sec2-phase3-curation
    file: sec2-phase3-curation.png
    placement: Section 2, 감성 해칭 카드 (cold/warm/sharp) 위
    section: section-2
    after_element: "Phase 카드 그리드"
    description: >
      experimentFill 인터랙티브 UI 스크린샷 또는
      Final-16 큐레이션 결과 모음. 수천 개 중 선별된 최종 후보들.
    alt_ko: "큐레이션 과정 — 수천 개의 결과물 중 최적의 작품을 찾아가는 인터랙티브 UI"
    alt_en: "Curation process — interactive UI for finding the optimal artwork among thousands"
    priority: optional

  - id: sec2-hatching-samples
    file: sec2-hatching-samples.png
    placement: Section 2, cold/warm/sharp 카드 아래
    section: section-2
    after_element: "감성 키워드 카드 그리드"
    description: >
      세 가지 감성 해칭 실제 예시 비교.
      cold(수평 평행선), warm(동심 타원), sharp(크로스해치)가
      같은 형상에 적용된 3장 나란히 비교.
    alt_ko: "감성 해칭 비교 — cold(수평선), warm(동심 타원), sharp(크로스해치)"
    alt_en: "Emotional hatching comparison — cold (horizontal), warm (concentric), sharp (crosshatch)"
    priority: highly-recommended

  # ─────────────────────────────────────────────
  # Section 3 — What (화면에서 종이로)
  # ─────────────────────────────────────────────
  - id: sec3-indy-painting
    file: sec3-indy-painting.png
    placement: Section 3, "물성을 얻는 순간" 두 번째 문단 뒤
    section: section-3
    after_paragraph: 2
    description: >
      핵심 이미지. 뉴로메카 인디(Indy) 로봇이 실제로 붓을 들고
      종이 위에 그림을 그리는 장면. 로봇팔 + 붓 + 종이가 모두 보이는 구도.
      "물성을 얻는 순간"의 결정적 장면.
    alt_ko: "인디(Indy) 로봇이 붓으로 종이 위에 그림을 그리는 장면"
    alt_en: "Indy robot drawing on paper with a brush"
    priority: required

  - id: sec3-digital-vs-physical
    file: sec3-digital-vs-physical.png
    placement: Section 3, "물성을 얻는 순간" 네 번째 문단 뒤
    section: section-3
    after_paragraph: 4
    description: >
      디지털 vs 물리적 출력 비교. 왼쪽: Mathematica 화면의 디지털 패턴,
      오른쪽: 로봇이 그린 종이 위의 실제 결과물.
      같은 G-code의 두 가지 존재 방식을 대비.
    alt_ko: "디지털 패턴(좌)과 로봇이 그린 실제 작품(우) 비교"
    alt_en: "Comparison: digital pattern (left) vs robot-painted physical artwork (right)"
    priority: highly-recommended

  - id: sec3-final-artwork
    file: sec3-final-artwork.png
    placement: Section 3, "예술적 결과물" 소제목 뒤
    section: section-3
    after_element: "h3:예술적 결과물"
    description: >
      완성된 Robotic Painting 대표 작품 1~2점.
      다층 구조(Line Grid + 채널 분리 + 감성 해칭)가
      한 눈에 드러나는 작품. 다색 펜으로 그린 레이어 구분이 보이면 최적.
    alt_ko: "Robotic Painting 완성 작품 — Line Grid, 채널 분리, 감성 해칭의 다층 구조"
    alt_en: "Completed Robotic Painting — multi-layered structure of Line Grid, channel separation, and emotional hatching"
    priority: highly-recommended

  - id: sec3-pipeline-diagram
    file: sec3-pipeline-diagram.png
    placement: Section 3, "기술적 결과물" 소제목 뒤 (리스트 위)
    section: section-3
    after_element: "h3:기술적 결과물"
    description: >
      전체 파이프라인 다이어그램.
      자연어 → Vibe Coding → Wolfram Language → G-code → 인디 로봇 → 물리적 작품.
      흐름도 형태, 각 단계를 아이콘/화살표로 표현.
    alt_ko: "Robotic Painting 파이프라인 — 자연어에서 물리적 작품까지의 전체 흐름"
    alt_en: "Robotic Painting pipeline — complete flow from natural language to physical artwork"
    priority: optional

  # ─────────────────────────────────────────────
  # Section 4 — Why (세 개의 교차점)
  # ─────────────────────────────────────────────
  - id: sec4-deputy-pm-visit
    file: sec4-deputy-pm-visit.png
    placement: Section 4, "비즈니스의 가능성" 인용문 위
    section: section-4
    after_element: "h3:비즈니스의 가능성"
    description: >
      구윤철 경제부총리 뉴로메카 방문 장면.
      Robotic Painting 시연 참관 사진. 있으면 공식 사진, 없으면 관련 장면.
    alt_ko: "구윤철 경제부총리의 뉴로메카 방문 — Robotic Painting 시연 참관 (2026.02.27)"
    alt_en: "Deputy PM Koo Yun-cheol visiting Neuromeka — Robotic Painting demonstration (2026.02.27)"
    priority: recommended

  # ─────────────────────────────────────────────
  # Section 5 — 다음 걸음
  # ─────────────────────────────────────────────
  - id: sec5-collaboration
    file: sec5-collaboration.png
    placement: Section 5, 첫 번째 문단 뒤
    section: section-5
    after_paragraph: 1
    description: >
      페블러스 × 뉴로메카 팀 사진 또는 협업 장면.
      박종훈 대표, 황성훈 본부장과의 미팅/시연 모습.
    alt_ko: "페블러스와 뉴로메카의 첫 콜라보 — 팀 협업 장면"
    alt_en: "Pebblous × Neuromeka first collaboration — team working together"
    priority: optional

# ─────────────────────────────────────────────
# 배치 우선순위 요약
# ─────────────────────────────────────────────
# required (2):        og, sec3-indy-painting
# highly-recommended (3): sec2-hatching-samples, sec3-digital-vs-physical, sec3-final-artwork
# recommended (3):     sec1-code-painting-origin, sec2-vibe-coding-process, sec2-phase2-patterns, sec4-deputy-pm-visit
# optional (3):        sec2-phase1-gcode, sec2-phase3-curation, sec3-pipeline-diagram, sec5-collaboration
#
# 최소 배치: 2장 (og + sec3-indy-painting)
# 권장 배치: 5장 (required + highly-recommended)
# 풍부한 배치: 8~12장 (전체)
