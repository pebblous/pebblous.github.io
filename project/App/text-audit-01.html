        /* Pebblous Theme Variables */

        .themeable-text {

        }

            background-color: var(--accent-color);

            color: var(--accent-color);
        }

            background-color: var(--accent-hover);
        }

            background-color: var(--teal-color);
        }

            background-color: var(--teal-hover);
        }

            color: var(--teal-color);

        /* 기본 테이블 스타일 */

            word-break: break-word;

            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-weight: 600;
            width: 20%;
        }
        /* 메인 테이블 td (Value) */

            width: 80%;
            background-color: var(--bg-card);
            color: var(--text-secondary);

            margin: 0;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            overflow: hidden;
            width: 100%;
            background-color: var(--bg-card);
        }
        .sub-table th, .sub-table td,
        .sub-grid th, .sub-grid td {
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 8px;
            white-space: pre-wrap;
            word-break: break-word;
            vertical-align: top;
            text-align: left;
        }
        .sub-table tr:last-child th,
        .sub-table tr:last-child td,
        .sub-grid tr:last-child th,
        .sub-grid tr:last-child td {
            border-bottom: none;
        }
        .sub-table th {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            width: 30%;
            font-weight: 500;
        }
        .sub-grid th {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-weight: 500;
        }
        .sub-list ul {
            list-style-type: disc;
            margin-left: 20px;
            padding: 8px 12px;
        }
        .sub-list li {
            padding: 4px 0;
        }

        /* 로딩 스피너 */
        .loader {
            border: 4px solid var(--bg-secondary);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 모달 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .modal-content {
            background-color: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
        }

        /* 통계 모달 */
        .stats-modal-content {
            max-width: 600px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .stats-category-item {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
        }
        .stats-category-item:hover {
            border-color: var(--accent-color);
            transform: translateX(5px);
        }
        .stats-progress-bar {
            width: 100%;
            height: 0.5rem;
            background-color: var(--bg-primary);
            border-radius: 0.25rem;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .stats-progress-fill {
            height: 100%;
            background-color: var(--accent-color);
            transition: width 0.5s ease-out;
            border-radius: 0.25rem;
        }
        .stats-icon-btn {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .stats-icon-btn:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* (v6) 화면 분할 레이아웃 */
        .split-container {
            display: flex;
            gap: 1rem;
            height: 600px; /* 고정 높이로 독립 스크롤 가능 */
        }
        .context-panel {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            overflow: hidden;
            background-color: var(--bg-card);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .questions-panel {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            overflow: hidden;
            background-color: var(--bg-card);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .panel-header {
            background-color: var(--bg-secondary);
            padding: 0.75rem 1rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            flex-shrink: 0;
        }
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            height: 100%;
        }
        .resizer {
            width: 8px;
            cursor: col-resize;
            background-color: var(--border-color);
            border-radius: 4px;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }
        .resizer:hover {
            background-color: var(--accent-color);
        }

        /* (v7) Context 필드 특수 스타일 */
        .context-item {
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .context-text-main {
            background-color: var(--bg-card);
            padding: 1rem;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .context-metadata {
            background-color: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .context-toggle {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .context-toggle:hover {
            background-color: var(--bg-primary);
        }
        .context-details {
            padding: 0.75rem 1rem;
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: none;
        }
        .context-details.open {
            display: block;
        }
        .toggle-icon {
            transition: transform 0.2s;
        }
        .toggle-icon.open {
            transform: rotate(90deg);
        }

        /* (v8) 검수 영역 고정 푸터 - 토글 가능 */
        #review-section {
            position: sticky;
            bottom: 0;
            background-color: var(--bg-card);
            border-top: 2px solid var(--border-color);
            margin: 1rem -1.5rem -1.5rem;
            z-index: 20;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            #review-section {
                margin: 1rem -2.5rem -2.5rem;
            }
        }

        .review-header {
            padding: 1rem 1.5rem;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-secondary);
        }

        .review-header:hover {
            background-color: var(--bg-primary);
        }

        .review-toggle-icon {
            transition: transform 0.3s ease;
            font-size: 1.2rem;
        }

        .review-toggle-icon.expanded {
            transform: rotate(180deg);
        }

        .review-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 1.5rem;
        }

        .review-content.expanded {
            max-height: 500px;
            padding: 1.5rem;
        }

        /* 모바일: 세로 레이아웃 */
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
                height: auto;
            }
            .resizer {
                display: none;
            }
            .context-panel, .questions-panel {
                min-height: 250px;
                height: auto;
            }
        }
    </style>
</head>

                },
                beige: {
                    logoImage: 'https://pebblous.github.io/image/Pebblous_BM_Orange_RGB.png',
                    icon: 'M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01'

            function setupThemeSwitcher() {
                const themeSwitcher = document.getElementById('theme-switcher');
                if (!themeSwitcher) return;

                // Clear existing buttons
                themeSwitcher.innerHTML = '';

                // Create icon buttons for each theme
                Object.keys(themes).forEach(themeName => {
                    const btn = document.createElement('button');
                    btn.dataset.theme = themeName;
                    btn.className = 'p-1 rounded-full transition-colors duration-300';
                    btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${themes[themeName].icon}"></path></svg>`;
                    btn.onclick = () => applyTheme(themeName, btn);
                    themeSwitcher.appendChild(btn);
                });

                // Apply initial theme
                const initialBtn = themeSwitcher.querySelector(`[data-theme="${savedTheme}"]`);
                if (initialBtn) {
                    applyTheme(savedTheme, initialBtn);
                }
            }

            function applyTheme(themeName, activeBtn) {
                // Update data-theme attribute
                document.documentElement.setAttribute('data-theme', themeName);
                localStorage.setItem('selectedTheme', themeName);

                // Update logo
                const pageLogo = document.getElementById('page-logo');
                if (pageLogo && themes[themeName]) {
                    pageLogo.src = themes[themeName].logoImage;
                }

                // Update button styles with appropriate colors for visibility
                const themeSwitcher = document.getElementById('theme-switcher');
                if (themeSwitcher) {
                    themeSwitcher.querySelectorAll('button').forEach(btn => {
                        const btnTheme = btn.dataset.theme;
                        btn.style.backgroundColor = 'transparent';

                        // Set icon color based on current theme for better visibility
                        if (themeName === 'dark') {
                            // Dark theme: all icons should be light
                            btn.style.color = '#cbd5e1'; // slate-300
                        } else if (themeName === 'light') {
                            // Light theme: all icons should be dark
                            btn.style.color = '#475569'; // slate-600
                        } else if (themeName === 'beige') {
                            // Beige theme: all icons should be dark brown
                            btn.style.color = '#5a534a';
                        }
                    });

                    if (activeBtn) {
                        activeBtn.style.backgroundColor = 'var(--accent-color)';
                        activeBtn.style.color = 'white';
                    }
                }
            }

            // Load header component
            fetch('/components/header.html')
                .then(response => {
                    if (!response.ok) throw new Error('Header not found');
                    return response.text();
                })
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;

                    // Set initial logo
                    const pageLogo = document.getElementById('page-logo');
                    if (pageLogo && themes[savedTheme]) {
                        pageLogo.src = themes[savedTheme].logoImage;
                    }

                    // Set up theme switcher with icons
                    setupThemeSwitcher();
                })
                .catch(err => {
                    console.error('Failed to load header:', err);
                    // Fallback: create header manually if component fails to load
                    const headerHTML = `
                        <nav id="sticky-header" class="themeable-card border-b themeable-border sticky top-0 z-50 backdrop-blur-lg">
                            <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-4">
                                <div class="flex justify-between items-center">
                                    <a href="/index.html" class="flex items-center space-x-2 hover:opacity-80 transition-opacity">
                                        <img id="page-logo" src="${themes[savedTheme].logoImage}" alt="Pebblous Logo" class="h-8 md:h-10 w-auto object-contain max-w-full">
                                    </a>
                                    <div class="flex items-center space-x-3">
                                        <a href="/index.html" class="p-2 rounded-full hover:bg-opacity-10 hover:bg-gray-500 transition-all" title="홈으로 이동">
                                            <svg class="w-5 h-5 themeable-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                                            </svg>
                                        </a>
                                        <div id="theme-switcher" class="flex items-center space-x-1 border themeable-border rounded-full p-1">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </nav>
                    `;
                    document.getElementById('header-placeholder').innerHTML = headerHTML;

                    // Set up theme switcher for fallback
                    setupThemeSwitcher();
                });
        });
    </script>

    <script>
        // --- 1. 전역 변수 및 DOM 요소 ---
        const fileUpload = document.getElementById('file-upload');
        const fileNameDisplay = document.getElementById('file-name-display');
        const uploadContainer = document.getElementById('upload-container');
        const viewerContainer = document.getElementById('viewer-container');
        const contextTable = document.getElementById('context-table');
        const questionsTable = document.getElementById('questions-table');
        const prevBtns = document.querySelectorAll('.nav-btn-prev');
        const nextBtns = document.querySelectorAll('.nav-btn-next');
        const currentIndexEl = document.getElementById('current-index');
        const totalCountEl = document.getElementById('total-count');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('error-message');
        const messageContainer = document.getElementById('message-container');
        const reviewerModal = document.getElementById('reviewer-modal');
        const reviewerNameInput = document.getElementById('reviewer-name-input');
        const startReviewBtn = document.getElementById('start-review-btn');
        const reviewerError = document.getElementById('reviewer-error');
        const reviewCheckbox = document.getElementById('review-checkbox');
        const reviewComment = document.getElementById('review-comment');
        const saveBtn = document.getElementById('save-btn');
        const loadNewFileBtn = document.getElementById('load-new-file-btn');
        const saveConfirmModal = document.getElementById('save-confirm-modal');
        const saveConfirmMessage = document.getElementById('save-confirm-message');
        const confirmSaveBtn = document.getElementById('confirm-save-btn');
        const cancelSaveBtn = document.getElementById('cancel-save-btn');

        let csvData = [];
        let headers = [];
        let currentIndex = 0;
        let reviewerName = '';
        let originalFileName = '';
        let originalFileExtension = ''; // (v5) 원본 파일 확장자 저장

        // (v6) 리사이저 관련 변수
        let isResizing = false;
        let startX = 0;
        let startWidthLeft = 0;
        let startWidthRight = 0;

        // --- 2. 초기화 및 라이브러리 검사 ---
        (function checkLibraries() {
            document.addEventListener('DOMContentLoaded', () => {
                if (typeof Papa === 'undefined' || typeof XLSX === 'undefined') {
                    console.error('Core libraries (PapaParse or SheetJS) not loaded.');
                    uploadContainer.innerHTML = `<div class="text-red-500 text-center font-medium p-4 border border-red-300 rounded-lg bg-red-50">
                        <p class="font-bold">오류: 필수 라이브러리를 불러오지 못했습니다.</p>
                        <p class="text-sm mt-1">인터넷 연결을 확인하고 페이지를 새로고침해주세요. (광고 차단기 등이 CDN을 막고 있을 수 있습니다)</p>
                    </div>`;
                    fileUpload.disabled = true;
                    messageContainer.classList.add('hidden');
                } else {
                    console.log("Libraries (PapaParse, SheetJS) loaded successfully.");
                }
            });
        })();

        // --- 3. 파일 업로드 (이벤트 바인딩) ---
        fileUpload.addEventListener('change', handleFile);
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadContainer.addEventListener(eventName, preventDefaults, false);
        });
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadContainer.addEventListener(eventName, () => uploadContainer.classList.add('bg-blue-50'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            uploadContainer.addEventListener(eventName, () => uploadContainer.classList.remove('bg-blue-50'), false);
        });
        uploadContainer.addEventListener('drop', handleDrop, false);

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                fileUpload.files = files;
                handleFile({ target: fileUpload });
            }
        }

        // --- 4. 파일 처리 (파싱) ---
        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            resetViewer();
            showLoader();
            fileNameDisplay.textContent = file.name;
            originalFileName = file.name;
            
            const fileExtension = file.name.split('.').pop().toLowerCase();
            originalFileExtension = fileExtension; // (v5) 확장자 저장

            try {
                if (fileExtension === 'csv') {
                    parseCSV(file);
                } else if (fileExtension === 'xls' || fileExtension === 'xlsx') {
                    parseExcel(file);
                } else if (fileExtension === 'json') {
                    parseJSON(file);
                } else {
                    throw new Error("지원하지 않는 파일 형식입니다. CSV, XLS, XLSX, JSON 파일을 업로드해주세요.");
                }
            } catch (err) {
                showError(err.message);
                hideLoader();
            }
        }

        function parseCSV(file) {
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                encoding: "UTF-8",
                complete: (results) => {
                    if (results.errors.length > 0) {
                        retryParsingWithEncoding(file, "euc-kr"); // UTF-8 실패 시 EUC-KR 시도
                    } else if (results.data && results.data.length > 0) {
                        onFileParsed(results.meta.fields, results.data);
                    } else {
                        throw new Error("파일을 파싱할 수 없거나 데이터가 비어있습니다.");
                    }
                },
                error: (err) => showError(`파일 파싱 중 오류가 발생했습니다: ${err.message}`)
            });
        }
        
        function retryParsingWithEncoding(file, encoding) {
            console.log(`UTF-8 파싱 실패. ${encoding}(으)로 재시도...`);
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                encoding: encoding,
                complete: (results) => {
                    if (results.errors.length > 0 || !results.data || results.data.length === 0) {
                        showError("파일 인코딩 형식을 인식할 수 없습니다. UTF-8 또는 EUC-KR로 저장된 CSV 파일을 사용해주세요.");
                    } else {
                        onFileParsed(results.meta.fields, results.data);
                    }
                },
                error: (err) => showError(`파일 파싱 중 오류가 발생했습니다: ${err.message}`)
            });
        }

        function parseExcel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    if (jsonData.length > 0) {
                        onFileParsed(Object.keys(jsonData[0]), jsonData);
                    } else {
                        throw new Error("엑셀 파일이 비어있거나 데이터를 읽을 수 없습니다.");
                    }
                } catch (err) {
                    showError(`엑셀 파일 처리 중 오류가 발생했습니다: ${err.message}`);
                }
            };
            reader.onerror = () => showError("파일을 읽는 중 오류가 발생했습니다.");
            reader.readAsArrayBuffer(file);
        }

        function parseJSON(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const jsonData = JSON.parse(e.target.result);
                    if (Array.isArray(jsonData) && jsonData.length > 0) {
                        // JSON 데이터의 모든 키를 헤더로 사용 (첫 번째 객체 기준)
                        onFileParsed(Object.keys(jsonData[0]), jsonData);
                    } else {
                        throw new Error("JSON 파일이 비어있거나, 객체 배열(Array of Objects) 형식이 아닙니다.");
                    }
                } catch (err) {
                    showError(`JSON 파일 처리 중 오류가 발생했습니다: ${err.message}`);
                }
            };
            reader.onerror = () => showError("파일을 읽는 중 오류가 발생했습니다.");
            reader.readAsText(file, "UTF-8");
        }

        // 파싱 성공 시 공통 콜백
        function onFileParsed(parsedHeaders, parsedData) {
            headers = parsedHeaders;
            csvData = parsedData;
            initializeReviewData();
            hideLoader();

            // 카테고리 통계 계산 및 설정
            calculateCategoryStats();

            showReviewerModal();
        }

        // --- 카테고리 통계 계산 ---
        function calculateCategoryStats() {
            const categoryStats = {};
            const categoryReviewedStats = {};
            let totalRecords = csvData.length;
            let totalReviewed = 0;

            // category 필드가 있는지 확인하고 통계 계산
            csvData.forEach((row, index) => {
                const category = row.category || row.Category || row.CATEGORY || '미분류';

                // 전체 개수

        // (v4) HTML 이스케이프 함수
        function escapeHTML(str) {
            if (typeof str !== 'string') {
                return str;
            }
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // (v4) JSON 하위 객체 렌더링 함수
        function renderValue(value) {
            // 1. null 또는 undefined
            if (value === undefined || value === null) {
                return '';
            }
            
            // 2. 배열 (Array)
            if (Array.isArray(value)) {
                if (value.length === 0) return '[]'; // 빈 배열

                // 2a. 단순 배열 (string, number)
                if (typeof value[0] === 'string' || typeof value[0] === 'number' || typeof value[0] === 'boolean') {
                    let listHtml = '<div class="sub-list"><ul>';
                    value.forEach(item => {
                        listHtml += `<li>${escapeHTML(String(item))}</li>`;
                    });
                    listHtml += '</ul></div>';
                    return listHtml;
                }
                
                // 2b. 객체 배열 (Array of Objects) -> Grid 테이블
                if (typeof value[0] === 'object' && value[0] !== null) {
                    let gridHtml = '<table class="sub-grid"><thead><tr>';
                    const subHeaders = Object.keys(value[0]);
                    subHeaders.forEach(subH => {
                        gridHtml += `<th>${escapeHTML(subH)}</th>`;
                    });
                    gridHtml += '</tr></thead><tbody>';

                    value.forEach(subRow => {
                        gridHtml += '<tr>';
                        subHeaders.forEach(subH => {
                            // 재귀 호출: 셀 안의 값도 객체일 수 있음
                            gridHtml += `<td>${renderValue(subRow[subH])}</td>`; 
                        });
                        gridHtml += '</tr>';
                    });
                    gridHtml += '</tbody></table>';
                    return gridHtml;
                }
            }

            // 3. 객체 (Object) -> Key-Value 테이블
            if (typeof value === 'object' && value !== null) {
                let tableHtml = '<table class="sub-table"><tbody>';
                Object.keys(value).forEach(key => {
                    tableHtml += `
                        <tr>
                            <th>${escapeHTML(key)}</th>
                            <td>${renderValue(value[key])}</td> <!-- 재귀 호출 -->
                        </tr>
                    `;
                });
                tableHtml += '</tbody></table>';
                return tableHtml;
            }

            // 4. 그 외 (string, number, boolean)
            return escapeHTML(String(value));
        }

        // (v7) Context 배열 특수 렌더링 함수
        function renderContextArray(contextArray) {
            if (!Array.isArray(contextArray)) return renderValue(contextArray);

            let html = '';
            contextArray.forEach((ctx, idx) => {
                if (!ctx || (!ctx.text && !ctx.context_id)) return; // 빈 항목 무시

                const contextId = ctx.context_id || `Context ${idx + 1}`;
                const text = ctx.text || '';
                const provenance = ctx.provenance || {};

                html += `
                    <div class="context-item">
                        <div class="context-text-main">${escapeHTML(text)}</div>
                        <div class="context-metadata context-toggle" onclick="toggleContextDetails(this)">
                            <span class="toggle-icon">▶</span>
                            <span>세부 정보 보기 (ID: ${escapeHTML(contextId)})</span>
                        </div>
                        <div class="context-details">
                            <div><strong>Context ID:</strong> ${escapeHTML(contextId)}</div>
                            ${provenance.doc_id ? `<div><strong>Document:</strong> ${escapeHTML(provenance.doc_id)}</div>` : ''}
                            ${provenance.page ? `<div><strong>Page:</strong> ${escapeHTML(String(provenance.page))}</div>` : ''}
                        </div>
                    </div>
                `;
            });
            return html;
        }

        // Context 세부정보 토글 함수
        function toggleContextDetails(element) {
            const details = element.nextElementSibling;
            const icon = element.querySelector('.toggle-icon');

            if (details && details.classList.contains('context-details')) {

            }
        }

        // (v5) 저장 처리 함수 - JSON/CSV 분기
        function handleSaveConfirmation() {
            const completedCount = csvData.filter(row => row.review_complete === true).length;
            
            // 코멘트에 타임스탬프 추가
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0]; // YYYY-MM-DD
            const timeStr = now.toTimeString().split(' ')[0]; // HH:MM:SS
            const timestamp = `(${reviewerName}, ${dateStr} ${timeStr})`;

            const escapedReviewerName = reviewerName.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const timestampRegex = new RegExp(`\\(${escapedReviewerName},\\s\\d{4}-\\d{2}-\\d{2}\\s\\d{2}:\\d{2}:\\d{2}\\)$`);

            // 데이터 복사본 생성 (원본 데이터 변경 방지)
            const dataToSave = csvData.map(row => {
                const newRow = { ...row }; // 얕은 복사
                
                // 타임스탬프 로직
                const comment = (newRow.review_comment || '').trim();
                if (comment !== '') {
                    if (!timestampRegex.test(comment)) {
                        newRow.review_comment = `${comment}\n${timestamp}`;
                    }
                }
                return newRow;
            });

            // 현재 화면 코멘트 업데이트 (복사본이 아닌 원본 데이터에 반영)
            if (csvData[currentIndex]) {
                const currentComment = (csvData[currentIndex].review_comment || '').trim();
                if (currentComment !== '' && !timestampRegex.test(currentComment)) {
                    csvData[currentIndex].review_comment = `${currentComment}\n${timestamp}`;
                    reviewComment.value = csvData[currentIndex].review_comment;
                }
            }

            // 파일명 생성 (v6: 원본 파일명 유지 로직)
            const fileTimeStr = timeStr.replace(/:/g, '-'); // HH-MM-SS
            const dateTimeForFile = `${dateStr}_${fileTimeStr}`;

            // 파일명에서 기존의 __검수자명__날짜 패턴 제거
            let baseName = originalFileName.replace(/\.(csv|xls|xlsx|json)$/i, '');
            // 기존 패턴 제거: __임의문자열__날짜_시간 형태를 찾아서 제거
            baseName = baseName.replace(/__[^_]+__\d{4}-\d{2}-\d{2}_[\d-]+$/, '');

            let newFileName = '';
            let blob;
            let mimeType = '';
            
            try {
                // (v6) 원본 파일 확장자에 따라 저장 포맷 결정
                if (originalFileExtension === 'json') {
                    // JSON으로 저장 (구분자 __ 사용)
                    newFileName = `${baseName}__${reviewerName}__${dateTimeForFile}.json`;
                    mimeType = 'application/json;charset=utf-8;';
                    
                    const jsonString = JSON.stringify(dataToSave, null, 2); // 예쁘게 포맷팅
                    const bom = new Uint8Array([0xEF, 0xBB, 0xBF]); // BOM 추가
                    blob = new Blob([bom, jsonString], { type: mimeType });

                } else {
                    // CSV로 저장 (구분자 __ 사용)
                    newFileName = `${baseName}__${reviewerName}__${dateTimeForFile}.csv`;
                    mimeType = 'text/csv;charset=utf-8;';

                    // CSV 헤더 (검수 필드 포함)
                    const exportHeaders = [...headers];
                    if (exportHeaders.indexOf('review_complete') === -1) exportHeaders.push('review_complete');
                    if (exportHeaders.indexOf('review_comment') === -1) exportHeaders.push('review_comment');

                    // CSV 변환 시 객체/배열을 JSON 문자열로 변환
                    const dataForCsv = dataToSave.map(row => {
                        const newRow = {};
                        for (const key in row) {
                            const value = row[key];
                            if (typeof value === 'object' && value !== null) {
                                newRow[key] = JSON.stringify(value);
                            } else {
                                newRow[key] = value;
                            }
                        }
                        return newRow;
                    });
                    
                    if (typeof Papa === 'undefined') {
                        throw new Error("CSV 저장 라이브러리(PapaParse) 로딩에 실패했습니다.");
                    }
                    
                    const csvString = Papa.unparse(dataForCsv, {
                        columns: exportHeaders,
                        header: true,
                    });

                    const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
                    blob = new Blob([bom, csvString], { type: mimeType });
                }

                // 파일 다운로드
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', newFileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                showSuccess(`저장 완료! 총 ${csvData.length}개 중 ${completedCount}개 검수 완료.`);

            } catch (err) {
                console.error("파일 저장 오류:", err);
                showError(err.message);
            }
        }

        // --- 9. 유틸리티 함수 (UI, 초기화) ---
        loadNewFileBtn.addEventListener('click', () => {
            resetViewer();
            fileUpload.click(); // 파일 선택창 바로 띄우기
        });
        
        function resetViewer() {
            csvData = [];
            headers = [];
            currentIndex = 0;
            reviewerName = '';
            originalFileName = '';
            originalFileExtension = ''; // (v5) 초기화
            reviewerNameInput.value = '';
            reviewerModal.classList.add('hidden');
            viewerContainer.classList.add('hidden');
            uploadContainer.classList.remove('hidden');
            contextTable.innerHTML = '';
            questionsTable.innerHTML = '';

            // (v6) 패널 크기 초기화
            if (contextPanel) contextPanel.style.flex = '1';
            if (questionsPanel) questionsPanel.style.flex = '1';

            hideLoader();
            hideError();
            fileNameDisplay.textContent = '파일을 드래그하거나 클릭하여 업로드하세요';
            fileUpload.value = ''; // 파일 입력값 초기화
        }

        function showLoader() {
            loader.classList.remove('hidden');
            messageContainer.classList.remove('hidden');
            hideError();
        }
        function hideLoader() {
            loader.classList.add('hidden');
            if (errorMessage.classList.contains('hidden')) {
                messageContainer.classList.add('hidden');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden', 'text-green-600');
            errorMessage.classList.add('text-red-500');
            messageContainer.classList.remove('hidden');
            hideLoader();
            fileUpload.value = ''; // 오류 시 파일 입력 초기화
            originalFileName = '';
            originalFileExtension = '';
            fileNameDisplay.textContent = '파일을 드래그하거나 클릭하여 업로드하세요';
        }
        function hideError() {
            errorMessage.textContent = '';
            errorMessage.classList.add('hidden');
            errorMessage.classList.remove('text-green-600');
            errorMessage.classList.add('text-red-500');
            if (loader.classList.contains('hidden')) {
                messageContainer.classList.add('hidden');
            }
        }
        
        function showSuccess(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden', 'text-red-500');
            errorMessage.classList.add('text-green-600');
            messageContainer.classList.remove('hidden');
            hideLoader();

            setTimeout(() => {
                hideError();
            }, 3000);
        }

        // --- 10. (v8) 검수 영역 토글 기능 ---
        function toggleReviewSection() {
            const content = document.getElementById('review-content');
            const icon = document.querySelector('.review-toggle-icon');

            if (content && icon) {
                content.classList.toggle('expanded');
                icon.classList.toggle('expanded');
            }
        }

        // --- 11. (v6) 리사이저 기능 ---
        const resizer = document.getElementById('resizer');
        const contextPanel = document.querySelector('.context-panel');
        const questionsPanel = document.querySelector('.questions-panel');

        if (resizer && contextPanel && questionsPanel) {
            resizer.addEventListener('mousedown', function(e) {
                // 모바일에서는 리사이저 비활성화
                if (window.innerWidth <= 768) return;

                isResizing = true;
                startX = e.clientX;
                startWidthLeft = contextPanel.offsetWidth;
                startWidthRight = questionsPanel.offsetWidth;

                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;

                const deltaX = e.clientX - startX;
                const newWidthLeft = startWidthLeft + deltaX;
                const newWidthRight = startWidthRight - deltaX;

                // 최소 너비 제한 (200px)
                if (newWidthLeft >= 200 && newWidthRight >= 200) {
                    contextPanel.style.flex = `0 0 ${newWidthLeft}px`;
                    questionsPanel.style.flex = `0 0 ${newWidthRight}px`;
                }
            });

            document.addEventListener('mouseup', function() {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

    </script>
</body>
